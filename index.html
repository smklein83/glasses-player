<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <!-- Referrer must flow to YouTube or the embed throws error 153 -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <!-- MRBD conventions -->
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="YouTube playlist player for Meta Ray-Ban Display">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>Glasses Playlist</title>
  <style>
    html, body {
      margin: 0;
      width: 600px;
      height: 600px;
      background: #000;            /* pure black = transparent on the additive display */
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: #cfefff;
    }
    [hidden] { display: none !important; }

    /* ---- Playlist selection screen ---- */
    #playlist-screen { display: flex; flex-direction: column; height: 600px; }
    #pl-title {
      height: 52px; line-height: 52px;
      text-align: center; font-size: 24px; color: #9fe8ff;
    }
    #playlists {
      flex: 1 1 auto;
      display: flex; flex-direction: column; gap: 12px;
      padding: 8px 12px; overflow-y: auto;
    }
    .pl-item {
      min-height: 92px;             /* glasses minimum tap target */
      font-size: 24px; font-weight: 600;
      color: #cfefff; background: #101418;
      border: 2px solid #2a3a44; border-radius: 14px;
      transition: all 150ms ease;
    }
    .pl-item:focus {
      outline: none;
      color: #ffffff;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.45);
      background: #0a2a36;
    }
    #pl-hint {
      height: 28px; line-height: 28px;
      text-align: center; font-size: 16px; color: #6fb8d4;
    }

    /* ---- Player screen ---- */
    #status {
      height: 26px; line-height: 26px;
      text-align: center; font-size: 20px; color: #9fe8ff;
    }
    #player { width: 600px; height: 338px; background: #000; }
    #vtitle {
      height: 30px; line-height: 30px; padding: 0 12px;
      text-align: center; font-size: 18px; color: #ffffff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #controls {
      display: flex; justify-content: center; gap: 8px;
      padding: 6px 4px;
    }
    #controls button {
      flex: 1 1 0; max-width: 112px;
      min-height: 92px;             /* glasses minimum tap target */
      font-size: 22px; font-weight: 600;
      color: #cfefff; background: #101418;
      border: 2px solid #2a3a44; border-radius: 14px;
      transition: all 150ms ease;
    }
    #controls button:focus {
      outline: none;
      color: #ffffff;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.45);
      background: #0a2a36;
    }
    #hint {
      height: 24px; line-height: 24px;
      text-align: center; font-size: 16px; color: #6fb8d4;
    }
    #err {
      height: 44px; padding: 0 12px;
      text-align: center; font-size: 16px; color: #ff8f8f;
    }
  </style>
</head>
<body>
  <!-- Screen 1: pick a playlist. Shown first. -->
  <div id="playlist-screen">
    <div id="pl-title">Choose a playlist</div>
    <div id="playlists"></div>
    <div id="pl-hint">Swipe to choose &middot; Pinch to select</div>
  </div>

  <!-- Screen 2: the player. Shown after a playlist is selected. -->
  <div id="player-screen" hidden>
    <div id="status">Loading player&hellip;</div>
    <div id="player"></div>
    <div id="vtitle"></div>
    <div id="controls">
      <button id="prev"   class="focusable">Prev</button>
      <button id="toggle" class="focusable">Play</button>
      <button id="next"   class="focusable">Next</button>
      <button id="back15" class="focusable">&lt;15</button>
      <button id="fwd30"  class="focusable">&gt;30</button>
      <button id="speed2" class="focusable">2x</button>
    </div>
    <div id="hint">Swipe &middot; Pinch to select &middot; Prev &times;2 = playlists</div>
    <div id="err"></div>
  </div>

  <script>
    // Each entry is either a YouTube playlist ({ name, list }) or a set of
    // self-hosted files ({ name, videos: [{title, src}, ...] }). Add as many
    // as you like — they all show up on the selection screen.
    var PLAYLISTS = [
      { name: 'Tech',    list: 'PLbnyQ6wMjZrE' },
      { name: 'Flight',  list: 'PLXOhq7WErQjs' },
      { name: 'Glasses', list: 'PLWuwaqqWR-30' }
    ];
    var SHUFFLE = false;            // set true for random order

    var player = null;              // active YouTube player (null in local mode)
    var ready = false;
    var ctl = null;                 // active controller: YouTube or the local <video>
    var lastPrev = 0;               // timestamp of the previous Prev press

    // YouTube's bot check ("Sign in to confirm you're not a bot") also
    // surfaces through the IFrame API as error 150, so 101/150 do not
    // necessarily mean the owner disabled embedding.
    var ERR = {
      2:   'invalid playlist or video id',
      5:   'HTML5 player error',
      100: 'video not found (skipping)',
      101: 'playback refused (embed disabled or bot check) — skipping',
      150: 'playback refused (embed disabled or bot check) — skipping',
      153: 'Referer not sent: this browser is not sending the Referer header, so YouTube refuses the embed'
    };
    var errStreak = 0;              // consecutive refused videos
    var MAX_SKIPS = 3;              // this many in a row = YouTube is blocking us, not the owners

    var ytApiReady = false;         // IFrame API script has loaded
    var ytLoading = false;          // ...or is loading
    var pendingYT = null;           // playlist selected before the API was ready

    function $(id) { return document.getElementById(id); }
    function setStatus(t) { $('status').textContent = t; }
    function setErr(t)    { $('err').textContent = t; }

    function showScreen(which) {
      $('playlist-screen').hidden = (which !== 'playlist');
      $('player-screen').hidden   = (which !== 'player');
    }

    // ---------- Playlist selection screen ----------

    function renderPlaylists() {
      var box = $('playlists');
      box.innerHTML = '';
      PLAYLISTS.forEach(function (pl, i) {
        var b = document.createElement('button');
        b.className = 'pl-item focusable';
        b.textContent = pl.name || ('Playlist ' + (i + 1));
        b.addEventListener('click', function () { selectPlaylist(i); });
        box.appendChild(b);
      });
      showScreen('playlist');
      var first = box.querySelector('.pl-item');
      if (first) { first.focus(); }
    }

    function selectPlaylist(i) {
      var pl = PLAYLISTS[i];
      if (!pl) { return; }
      teardown();
      showScreen('player');
      ready = false; errStreak = 0; ctl = null; lastPrev = 0;
      $('vtitle').textContent = '';
      $('toggle').textContent = 'Play';
      setErr('');
      setStatus('Loading…');
      if (pl.videos && pl.videos.length) { initLocal(pl.videos); }
      else { createYouTubePlayer(pl.list); }
    }

    // Prev-pressed-twice escape hatch, and the Back path in general.
    function backToPlaylists() {
      teardown();
      setStatus('Loading player…');
      renderPlaylists();
    }

    // Stop and remove whatever is currently playing so nothing keeps running
    // (or making sound) behind the selection screen.
    function teardown() {
      ready = false;
      ctl = null;
      if (player) {
        try { player.destroy(); } catch (e) {}
        player = null;
      }
      var host = $('player');
      var vids = host.getElementsByTagName('video');
      for (var k = 0; k < vids.length; k++) {
        try { vids[k].pause(); vids[k].removeAttribute('src'); vids[k].load(); } catch (e) {}
      }
      host.innerHTML = '';
    }

    // ---------- YouTube mode ----------

    // Load the IFrame Player API once; onYouTubeIframeAPIReady fires when ready.
    function ensureYouTubeApi() {
      if (ytApiReady || ytLoading) { return; }
      ytLoading = true;
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      tag.onerror = function () { setErr('Could not load YouTube player script (network blocked?)'); };
      document.head.appendChild(tag);
    }

    // Global callback: the API calls this when loaded.
    function onYouTubeIframeAPIReady() {
      ytApiReady = true;
      if (pendingYT) { var f = pendingYT; pendingYT = null; f(); }
    }

    function createYouTubePlayer(listId) {
      // Selected before the API finished loading? Queue it.
      if (!ytApiReady) {
        pendingYT = function () { createYouTubePlayer(listId); };
        ensureYouTubeApi();
        return;
      }
      var host = $('player');
      host.innerHTML = '';
      var mount = document.createElement('div');   // YT.Player replaces this node
      host.appendChild(mount);

      var vars = {
        listType: 'playlist',
        list: listId,
        playsinline: 1,
        controls: 0,          // playback is driven by the buttons below
        rel: 0,
        fs: 0,
        disablekb: 1,
        iv_load_policy: 3
      };
      if (location.protocol === 'https:' || location.protocol === 'http:') {
        vars.origin = location.origin;
        vars.widget_referrer = location.href;
      }
      player = new YT.Player(mount, {
        width: 600,
        height: 338,
        // www.youtube.com, NOT youtube-nocookie.com: privacy-enhanced mode
        // strips cookies, and cookie-less embeds trip YouTube's "confirm
        // you're not a bot" wall, which then reports error 150 on every video.
        host: 'https://www.youtube.com',
        playerVars: vars,
        events: {
          onReady: function () {
            ctl = {
              prev:    function () { player.previousVideo(); },
              next:    function () { player.nextVideo(); },
              toggle:  togglePlay,
              back15:  function () {
                player.seekTo(Math.max(0, player.getCurrentTime() - 15), true);
              },
              fwd30:   function () {
                var target = player.getCurrentTime() + 30;
                var duration = player.getDuration();
                if (duration) { target = Math.min(duration, target); }
                player.seekTo(target, true);
              },
              speed2:  function () {
                var rate = player.getPlaybackRate() === 2 ? 1 : 2;
                player.setPlaybackRate(rate);
                setStatus('Speed ' + rate + 'x');
              }
            };
            ready = true;
            player.setLoop(true);
            if (SHUFFLE) { player.setShuffle(true); }
            setStatus('Ready');
            $('toggle').focus();
          },
          onStateChange: function (e) {
            var d = player.getVideoData ? player.getVideoData() : null;
            if (d && d.title) { $('vtitle').textContent = d.title; }
            if (e.data === YT.PlayerState.PLAYING) {
              $('toggle').textContent = 'Pause';
              var i = player.getPlaylistIndex() + 1;
              var list = player.getPlaylist() || [];
              setStatus('Video ' + i + (list.length ? ' of ' + list.length : ''));
              clearBlocked();
              setErr('');
            } else if (e.data === YT.PlayerState.PAUSED) {
              $('toggle').textContent = 'Play';
              setStatus('Paused');
            } else if (e.data === YT.PlayerState.BUFFERING) {
              setStatus('Buffering…');
            } else if (e.data === YT.PlayerState.ENDED) {
              $('toggle').textContent = 'Play';
              setStatus('Playlist ended');
            }
          },
          onError: function (e) {
            // No devtools on glasses, so surface the code on the lens.
            setErr('YouTube error ' + e.data + (ERR[e.data] ? ': ' + ERR[e.data] : ''));
            if (e.data === 100 || e.data === 101 || e.data === 150) {
              errStreak++;
              if (errStreak < MAX_SKIPS) { player.nextVideo(); }
              else { showBlocked(); }   // stop skip-looping the whole playlist
            }
          }
        }
      });
    }

    // ---------- Self-hosted mode: same controls, no YouTube, no bot wall ----------

    function initLocal(list) {
      if (SHUFFLE) {
        list = list.slice();
        for (var s = list.length - 1; s > 0; s--) {
          var r = Math.floor(Math.random() * (s + 1));
          var t = list[s]; list[s] = list[r]; list[r] = t;
        }
      }
      var v = document.createElement('video');
      v.width = 600; v.height = 338;
      v.setAttribute('playsinline', '');
      v.preload = 'auto';
      $('player').appendChild(v);

      var idx = 0;
      function tryPlay() {
        var p = v.play();
        // Before the first pinch the browser may veto autoplay; just wait.
        if (p && p.catch) { p.catch(function () { $('toggle').textContent = 'Play'; setStatus('Press Play'); }); }
      }
      function load(i, autoplay) {
        idx = ((i % list.length) + list.length) % list.length;
        v.src = list[idx].src;
        $('vtitle').textContent = list[idx].title || list[idx].src;
        setStatus('Video ' + (idx + 1) + ' of ' + list.length);
        if (autoplay) { tryPlay(); }
      }

      v.addEventListener('playing', function () {
        errStreak = 0;
        $('toggle').textContent = 'Pause';
        setStatus('Video ' + (idx + 1) + ' of ' + list.length);
        setErr('');
      });
      v.addEventListener('pause', function () {
        if (!v.ended) { $('toggle').textContent = 'Play'; setStatus('Paused'); }
      });
      v.addEventListener('waiting', function () { setStatus('Buffering…'); });
      v.addEventListener('ended', function () { load(idx + 1, true); });   // loop the playlist
      v.addEventListener('error', function () {
        setErr('Could not play "' + ($('vtitle').textContent) + '" (skipping)');
        errStreak++;
        if (errStreak < list.length) { load(idx + 1, true); }
        else { setStatus('No playable videos'); $('toggle').textContent = 'Play'; }
      });

      ctl = {
        prev:    function () { load(idx - 1, true); },
        next:    function () { load(idx + 1, true); },
        toggle:  function () { if (v.paused || v.ended) { tryPlay(); } else { v.pause(); } },
        back15:  function () { v.currentTime = Math.max(0, v.currentTime - 15); },
        fwd30:   function () {
          var target = v.currentTime + 30;
          if (isFinite(v.duration)) { target = Math.min(v.duration, target); }
          v.currentTime = target;
        },
        speed2:  function () {
          var rate = v.playbackRate === 2 ? 1 : 2;
          v.playbackRate = rate;
          setStatus('Speed ' + rate + 'x');
        }
      };
      ready = true;
      load(0, false);
      setStatus('Ready — ' + list.length + ' videos');
      $('toggle').focus();
    }

    // Every video refused in a row: YouTube's bot wall has flagged this
    // browser or network, not individual videos — it even blocks the plain
    // playlist page. The two known cures are a signed-in Google session and
    // a different egress IP.
    function showBlocked() {
      setStatus('Playback blocked');
      setErr('YouTube is blocking this browser (bot check). Switch Wi-Fi/hotspot and retry.');
      $('toggle').focus();
    }
    function clearBlocked() { errStreak = 0; }

    function guarded(fn) {
      return function () {
        if (!ready) { setStatus('Still loading…'); return; }
        fn();
      };
    }
    function togglePlay() {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) { player.pauseVideo(); }
      else { player.playVideo(); }    // pinch is a user gesture, so audio is allowed
    }

    // Prev twice within 2 seconds = escape back to the playlist screen.
    // Otherwise Prev just goes to the previous video, as usual.
    $('prev').addEventListener('click', guarded(function () {
      var now = Date.now();
      if (now - lastPrev <= 2000) { lastPrev = 0; backToPlaylists(); return; }
      lastPrev = now;
      clearBlocked(); ctl.prev();
    }));
    $('toggle').addEventListener('click', guarded(function () { lastPrev = 0; clearBlocked(); ctl.toggle(); }));
    $('next').addEventListener('click',   guarded(function () { lastPrev = 0; clearBlocked(); ctl.next(); }));
    $('back15').addEventListener('click', guarded(function () { lastPrev = 0; ctl.back15(); }));
    $('fwd30').addEventListener('click',  guarded(function () { lastPrev = 0; ctl.fwd30(); }));
    $('speed2').addEventListener('click', guarded(function () { lastPrev = 0; ctl.speed2(); }));

    // MRBD input model: swipes arrive as arrow keys, index pinch/tap as Enter.
    // Arrows move focus across whatever buttons are on screen (playlist items
    // or player controls); Enter activates the focused one.
    function visibleFocusables() {
      return Array.prototype.slice.call(document.querySelectorAll('.focusable'))
        .filter(function (el) { return el.offsetParent !== null; });
    }
    function moveFocus(back) {
      var f = visibleFocusables();
      if (!f.length) { return; }
      var i = f.indexOf(document.activeElement);
      if (i === -1) {
        var toggle = $('toggle');
        (f.indexOf(toggle) >= 0 ? toggle : f[0]).focus();   // default to Play/Pause on the player
        return;
      }
      var n = back ? (i > 0 ? i - 1 : f.length - 1)
                   : (i < f.length - 1 ? i + 1 : 0);
      f[n].focus();
    }
    document.addEventListener('keydown', function (e) {
      switch (e.key) {
        case 'ArrowLeft':
        case 'ArrowUp':    moveFocus(true);  break;
        case 'ArrowRight':
        case 'ArrowDown':  moveFocus(false); break;
        case 'Enter':
          if (document.activeElement && document.activeElement.classList &&
              document.activeElement.classList.contains('focusable')) {
            document.activeElement.click();
          } else {
            var first = visibleFocusables()[0];
            if (first) { first.focus(); }
          }
          break;
        default: return;   // don't preventDefault on unhandled keys
      }
      e.preventDefault();
    });

    // ---------- Boot ----------
    // A videos.json manifest in the repo still works: it becomes an extra
    // "Self-hosted" playlist on the selection screen. YouTube's bot wall
    // currently blocks this browser outright, so self-hosted is the path that
    // cannot be blocked (see README).
    function boot() {
      if (PLAYLISTS.some(function (p) { return p.list; })) { ensureYouTubeApi(); }
      renderPlaylists();
    }
    if (typeof fetch !== 'function') {
      boot();
    } else {
      fetch('videos.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; })
        .then(function (list) {
          if (list && list.length) { PLAYLISTS.push({ name: 'Self-hosted', videos: list }); }
          boot();
        });
    }
  </script>
</body>
</html>
